syntax = "proto3";

package auth;

option go_package = "github.com/tuannm99/podzone/pkg/api/proto/auth/v1;pbauthv1";


import "google/api/annotations.proto";

// AuthService owns authentication, session lifecycle, token refresh,
// OAuth login exchange, and active-tenant switching for an authenticated session.
service AuthService {
  rpc GoogleLogin(GoogleLoginRequest) returns (GoogleLoginResponse) {
    option (google.api.http) = {
      get: "/auth/v1/google/login"
    };
  }

  rpc GoogleCallback(GoogleCallbackRequest) returns (GoogleCallbackResponse) {
    option (google.api.http) = {
      get: "/auth/v1/google/callback"
    };
  }

  rpc ExchangeGoogleLogin(ExchangeGoogleLoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/auth/v1/google/exchange"
      body: "*"
    };
  }

  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/auth/v1/login"
      body: "*"
    };
  }

  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/auth/v1/register"
      body: "*"
    };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/auth/v1/refresh"
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/auth/v1/logout"
      body: "*"
    };
  }

  rpc SwitchActiveTenant(SwitchActiveTenantRequest) returns (SwitchActiveTenantResponse) {
    option (google.api.http) = {
      post: "/auth/v1/iam/tenants:switch"
      body: "*"
    };
  }

  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {
    option (google.api.http) = {
      get: "/auth/v1/sessions/{session_id}"
    };
  }

  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {
    option (google.api.http) = {
      get: "/auth/v1/sessions"
    };
  }

  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse) {
    option (google.api.http) = {
      delete: "/auth/v1/sessions/{session_id}"
    };
  }

  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse) {
    option (google.api.http) = {
      get: "/auth/v1/audit-logs"
    };
  }

}

// IAMService owns tenant memberships, role bindings, and permission evaluation.
// It is intentionally separate from AuthService so it can scale and deploy independently.
service IAMService {
  rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse) {
    option (google.api.http) = {
      post: "/auth/v1/iam/tenants"
      body: "*"
    };
  }

  rpc AddTenantMember(AddTenantMemberRequest) returns (AddTenantMemberResponse) {
    option (google.api.http) = {
      post: "/auth/v1/iam/tenants/{tenant_id}/members"
      body: "*"
    };
  }

  rpc AddTenantMemberByIdentity(AddTenantMemberByIdentityRequest) returns (AddTenantMemberByIdentityResponse) {
    option (google.api.http) = {
      post: "/auth/v1/iam/tenants/{tenant_id}/members:resolve"
      body: "*"
    };
  }

  rpc CreateTenantInvite(CreateTenantInviteRequest) returns (CreateTenantInviteResponse) {
    option (google.api.http) = {
      post: "/auth/v1/iam/tenants/{tenant_id}/invites"
      body: "*"
    };
  }

  rpc ListTenantInvites(ListTenantInvitesRequest) returns (ListTenantInvitesResponse) {
    option (google.api.http) = {
      get: "/auth/v1/iam/tenants/{tenant_id}/invites"
    };
  }

  rpc RevokeTenantInvite(RevokeTenantInviteRequest) returns (RevokeTenantInviteResponse) {
    option (google.api.http) = {
      delete: "/auth/v1/iam/invites/{invite_id}"
    };
  }

  rpc AcceptTenantInvite(AcceptTenantInviteRequest) returns (AcceptTenantInviteResponse) {
    option (google.api.http) = {
      post: "/auth/v1/iam/invites:accept"
      body: "*"
    };
  }

  rpc GetTenantMembership(GetTenantMembershipRequest) returns (GetTenantMembershipResponse) {
    option (google.api.http) = {
      get: "/auth/v1/iam/tenants/{tenant_id}/members/{user_id}"
    };
  }

  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse) {
    option (google.api.http) = {
      post: "/auth/v1/iam/permissions:check"
      body: "*"
    };
  }

  rpc CheckPlatformPermission(CheckPlatformPermissionRequest) returns (CheckPermissionResponse) {
    option (google.api.http) = {
      post: "/auth/v1/iam/platform-permissions:check"
      body: "*"
    };
  }

  rpc ListUserTenants(ListUserTenantsRequest) returns (ListUserTenantsResponse) {
    option (google.api.http) = {
      get: "/auth/v1/iam/users/{user_id}/tenants"
    };
  }

  rpc ListPlatformRoles(ListPlatformRolesRequest) returns (ListPlatformRolesResponse) {
    option (google.api.http) = {
      get: "/auth/v1/iam/platform-users/{target_user_id}/roles"
    };
  }

  rpc AddPlatformRole(AddPlatformRoleRequest) returns (AddPlatformRoleResponse) {
    option (google.api.http) = {
      post: "/auth/v1/iam/platform-users/{target_user_id}/roles"
      body: "*"
    };
  }

  rpc RemovePlatformRole(RemovePlatformRoleRequest) returns (RemovePlatformRoleResponse) {
    option (google.api.http) = {
      delete: "/auth/v1/iam/platform-users/{target_user_id}/roles/{role_name}"
    };
  }

  rpc ListTenantMembers(ListTenantMembersRequest) returns (ListTenantMembersResponse) {
    option (google.api.http) = {
      get: "/auth/v1/iam/tenants/{tenant_id}/members"
    };
  }

  rpc RemoveTenantMember(RemoveTenantMemberRequest) returns (RemoveTenantMemberResponse) {
    option (google.api.http) = {
      delete: "/auth/v1/iam/tenants/{tenant_id}/members/{user_id}"
    };
  }
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string jwt_token = 1;
  UserInfo user_info = 2;
  string refresh_token = 3;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string email = 3;
}

message RegisterResponse {
  string jwt_token = 1;
  UserInfo user_info = 2;
  string refresh_token = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string jwt_token = 1;
  UserInfo user_info = 2;
  string refresh_token = 3;
}

message GoogleLoginRequest {
  string redirect_after_login = 1;
}

message GoogleLoginResponse {
  string redirect_url = 1;
}

message GoogleCallbackRequest {
  string state = 1;
  string code = 2;
}

message GoogleCallbackResponse {
  string exchange_code = 1;
  string redirect_url = 2;
  GoogleUserInfo user_info = 3;
}

message ExchangeGoogleLoginRequest {
  string exchange_code = 1;
}

message LogoutRequest {
  string token = 1;
}

message LogoutResponse {
  bool success = 1;
  string redirect_url = 2;
}

message Session {
  string id = 1;
  uint64 user_id = 2;
  string active_tenant_id = 3;
  string status = 4;
  string created_at = 5;
  string updated_at = 6;
  string expires_at = 7;
  string revoked_at = 8;
}

message AuditLog {
  string id = 1;
  uint64 actor_user_id = 2;
  string action = 3;
  string resource_type = 4;
  string resource_id = 5;
  string tenant_id = 6;
  string status = 7;
  string payload_json = 8;
  string created_at = 9;
}

message Tenant {
  string id = 1;
  string slug = 2;
  string name = 3;
  string created_at = 4;
  string updated_at = 5;
}

message TenantMembership {
  string tenant_id = 1;
  uint64 user_id = 2;
  uint64 role_id = 3;
  string role_name = 4;
  string status = 5;
  string created_at = 6;
  string updated_at = 7;
}

message TenantInvite {
  string id = 1;
  string tenant_id = 2;
  string email = 3;
  uint64 role_id = 4;
  string role_name = 5;
  string status = 6;
  uint64 invited_by_user_id = 7;
  uint64 accepted_by_user_id = 8;
  string created_at = 9;
  string updated_at = 10;
  string expires_at = 11;
  string accepted_at = 12;
  string revoked_at = 13;
}

message CreateTenantRequest {
  uint64 owner_user_id = 1;
  string slug = 2;
  string name = 3;
}

message CreateTenantResponse {
  Tenant tenant = 1;
  TenantMembership owner_membership = 2;
}

message AddTenantMemberRequest {
  string tenant_id = 1;
  uint64 user_id = 2;
  string role_name = 3;
}

message AddTenantMemberResponse {}

message AddTenantMemberByIdentityRequest {
  string tenant_id = 1;
  string identity = 2;
  string role_name = 3;
}

message AddTenantMemberByIdentityResponse {
  uint64 user_id = 1;
  bool created_user = 2;
}

message CreateTenantInviteRequest {
  string tenant_id = 1;
  string email = 2;
  string role_name = 3;
}

message CreateTenantInviteResponse {
  TenantInvite invite = 1;
  string invite_token = 2;
  string accept_url = 3;
}

message ListTenantInvitesRequest {
  string tenant_id = 1;
}

message ListTenantInvitesResponse {
  repeated TenantInvite invites = 1;
}

message RevokeTenantInviteRequest {
  string invite_id = 1;
}

message RevokeTenantInviteResponse {}

message AcceptTenantInviteRequest {
  string invite_token = 1;
}

message AcceptTenantInviteResponse {
  TenantMembership membership = 1;
}

message ListUserTenantsRequest {
  uint64 user_id = 1;
}

message ListUserTenantsResponse {
  repeated TenantMembership memberships = 1;
}

message PlatformRoleMembership {
  uint64 user_id = 1;
  uint64 role_id = 2;
  string role_name = 3;
  string status = 4;
  string created_at = 5;
  string updated_at = 6;
}

message ListPlatformRolesRequest {
  uint64 actor_user_id = 1;
  uint64 target_user_id = 2;
}

message ListPlatformRolesResponse {
  repeated PlatformRoleMembership memberships = 1;
}

message AddPlatformRoleRequest {
  uint64 actor_user_id = 1;
  uint64 target_user_id = 2;
  string role_name = 3;
}

message AddPlatformRoleResponse {}

message RemovePlatformRoleRequest {
  uint64 actor_user_id = 1;
  uint64 target_user_id = 2;
  string role_name = 3;
}

message RemovePlatformRoleResponse {}

message GetTenantMembershipRequest {
  string tenant_id = 1;
  uint64 user_id = 2;
}

message GetTenantMembershipResponse {
  TenantMembership membership = 1;
}

message CheckPermissionRequest {
  string tenant_id = 1;
  uint64 user_id = 2;
  string permission = 3;
}

message CheckPlatformPermissionRequest {
  uint64 user_id = 1;
  string permission = 2;
}

message CheckPermissionResponse {
  bool allowed = 1;
}

message ListTenantMembersRequest {
  string tenant_id = 1;
}

message ListTenantMembersResponse {
  repeated TenantMembership memberships = 1;
}

message RemoveTenantMemberRequest {
  string tenant_id = 1;
  uint64 user_id = 2;
}

message RemoveTenantMemberResponse {}

message SwitchActiveTenantRequest {
  uint64 user_id = 1;
  string tenant_id = 2;
  string access_token = 3;
}

message SwitchActiveTenantResponse {
  string jwt_token = 1;
  UserInfo user_info = 2;
  string refresh_token = 3;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message RevokeSessionRequest {
  string session_id = 1;
}

message RevokeSessionResponse {}

message ListAuditLogsRequest {
  int32 page_size = 1;
}

message ListAuditLogsResponse {
  repeated AuditLog logs = 1;
}

message GoogleUserInfo {
  string id = 1;
  string email = 2;
  string name = 3;
  string given_name = 4;
  string family_name = 5;
  string picture = 6;
  bool email_verified = 7;
}

message UserInfo {
  int32 id = 1;
  string email = 2;
  string username = 3;
  string full_name = 4;
  string middle_name = 5;
  string first_name = 6;
  string last_name = 7;
  string address = 8;
  string initial_from = 9;
  int32 age = 10;
  string dob = 11;
  bool email_verified = 12;
}
