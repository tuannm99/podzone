syntax = "proto3";

package iam;

option go_package = "github.com/tuannm99/podzone/pkg/api/proto/iam/v1;pbiamv1";

import "common/v1/common.proto";

message Tenant {
  string id = 1;
  string slug = 2;
  string name = 3;
  string created_at = 4;
  string updated_at = 5;
  string org_id = 6;
}

message Organization {
  string id = 1;
  string slug = 2;
  string name = 3;
  string created_at = 4;
  string updated_at = 5;
  uint64 root_user_id = 6;
}

message OrganizationMembership {
  string org_id = 1;
  uint64 user_id = 2;
  uint64 role_id = 3;
  string role_name = 4;
  string status = 5;
  string created_at = 6;
  string updated_at = 7;
}

message TenantMembership {
  string tenant_id = 1;
  uint64 user_id = 2;
  uint64 role_id = 3;
  string role_name = 4;
  string status = 5;
  string created_at = 6;
  string updated_at = 7;
}

message TenantInvite {
  string id = 1;
  string tenant_id = 2;
  string email = 3;
  uint64 role_id = 4;
  string role_name = 5;
  string status = 6;
  uint64 invited_by_user_id = 7;
  uint64 accepted_by_user_id = 8;
  string created_at = 9;
  string updated_at = 10;
  string expires_at = 11;
  string accepted_at = 12;
  string revoked_at = 13;
}

message DirectoryUser {
  uint64 id = 1;
  string email = 2;
  string username = 3;
  string display_name = 4;
}

message ListDirectoryUsersRequest {
  string scope = 1;
  string org_id = 2;
  string tenant_id = 3;
  common.CollectionRequest collection = 4;
}

message ListDirectoryUsersResponse {
  repeated DirectoryUser users = 1;
  common.PageInfo page_info = 2;
}

message CreateTenantRequest {
  uint64 owner_user_id = 1;
  string slug = 2;
  string name = 3;
}

message CreateTenantResponse {
  Tenant tenant = 1;
  TenantMembership owner_membership = 2;
}

message CreateOrganizationRequest {
  string name = 1;
  string slug = 2;
}

message CreateOrganizationResponse {
  Organization organization = 1;
}

message EnsureRootOrganizationRequest {
  string name = 1;
  string slug = 2;
}

message EnsureRootOrganizationResponse {
  Organization organization = 1;
}

message ListOrganizationsRequest {
  common.CollectionRequest collection = 1;
}

message ListOrganizationsResponse {
  repeated Organization organizations = 1;
  common.PageInfo page_info = 2;
  bool can_manage_platform = 3;
}

message AddOrganizationMemberRequest {
  string org_id = 1;
  uint64 user_id = 2;
  string role_name = 3;
}

message AddOrganizationMemberResponse {}

message RemoveOrganizationMemberRequest {
  string org_id = 1;
  uint64 user_id = 2;
}

message RemoveOrganizationMemberResponse {}

message ListOrganizationMembersRequest {
  string org_id = 1;
  common.CollectionRequest collection = 2;
}

message ListOrganizationMembersResponse {
  repeated OrganizationMembership memberships = 1;
  common.PageInfo page_info = 2;
}

message AttachTenantToOrganizationRequest {
  string org_id = 1;
  string tenant_id = 2;
}

message AttachTenantToOrganizationResponse {}

message DetachTenantFromOrganizationRequest {
  string org_id = 1;
  string tenant_id = 2;
}

message DetachTenantFromOrganizationResponse {}

message AddTenantMemberRequest {
  string tenant_id = 1;
  uint64 user_id = 2;
  string role_name = 3;
}

message AddTenantMemberResponse {}

message AddTenantMemberByIdentityRequest {
  string tenant_id = 1;
  string identity = 2;
  string role_name = 3;
}

message AddTenantMemberByIdentityResponse {
  uint64 user_id = 1;
  bool created_user = 2;
}

message CreateTenantInviteRequest {
  string tenant_id = 1;
  string email = 2;
  string role_name = 3;
}

message CreateTenantInviteResponse {
  TenantInvite invite = 1;
  string invite_token = 2;
  string accept_url = 3;
}

message ListTenantInvitesRequest {
  string tenant_id = 1;
  common.CollectionRequest collection = 2;
}

message ListTenantInvitesResponse {
  repeated TenantInvite invites = 1;
  common.PageInfo page_info = 2;
}

message RevokeTenantInviteRequest {
  string invite_id = 1;
}

message RevokeTenantInviteResponse {}

message AcceptTenantInviteRequest {
  string invite_token = 1;
}

message AcceptTenantInviteResponse {
  TenantMembership membership = 1;
}

message GetTenantMembershipRequest {
  string tenant_id = 1;
  uint64 user_id = 2;
}

message GetTenantMembershipResponse {
  TenantMembership membership = 1;
}

message ListUserTenantsRequest {
  uint64 user_id = 1;
}

message ListUserTenantsResponse {
  repeated TenantMembership memberships = 1;
}

message ListTenantMembersRequest {
  string tenant_id = 1;
  common.CollectionRequest collection = 2;
}

message ListTenantMembersResponse {
  repeated TenantMembership memberships = 1;
  common.PageInfo page_info = 2;
}

message RemoveTenantMemberRequest {
  string tenant_id = 1;
  uint64 user_id = 2;
}

message RemoveTenantMemberResponse {}
