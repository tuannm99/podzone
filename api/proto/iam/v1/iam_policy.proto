message ListPlatformUserPoliciesRequest {
  uint64 target_user_id = 1;
}

message ListPlatformUserPoliciesResponse {
  repeated Policy policies = 1;
}

message PutPlatformUserInlinePolicyRequest {
  uint64 target_user_id = 1;
  string name = 2;
  string description = 3;
  repeated common.PolicyStatement statements = 4;
}

message PutPlatformUserInlinePolicyResponse {}

message GetPlatformUserInlinePolicyRequest {
  uint64 target_user_id = 1;
  string name = 2;
}

message GetPlatformUserInlinePolicyResponse {
  UserInlinePolicy policy = 1;
}

message ListPlatformUserInlinePoliciesRequest {
  uint64 target_user_id = 1;
}

message ListPlatformUserInlinePoliciesResponse {
  repeated UserInlinePolicy policies = 1;
}

message DeletePlatformUserInlinePolicyRequest {
  uint64 target_user_id = 1;
  string name = 2;
}

message DeletePlatformUserInlinePolicyResponse {}

message AttachPlatformUserPolicyRequest {
  uint64 target_user_id = 1;
  string policy_name = 2;
}

