services:
  postgres:
    image: postgres:15
    container_name: podzone-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - podzone_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: podzone-pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '6432:6432'
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: podzone-redis
    ports:
      - '6379:6379'
    volumes:
      - podzone_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: podzone-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: podzone
      MONGO_INITDB_ROOT_PASSWORD: podzone123
    ports:
      - '27017:27017'
    volumes:
      - podzone_mongo_data:/data/db
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'echo "db.runCommand({ ping: 1 }).ok" | mongosh mongodb://podzone:podzone123@127.0.0.1:27017/admin --quiet'
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: podzone-elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - '9200:9200'
      - '9300:9300'
    volumes:
      - podzone_elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  etcd:
    image: bitnami/etcd:3.5.21
    container_name: podzone-etcd
    user: '0'
    command: sh -c "mkdir -p /bitnami/etcd/data && chmod 777 /bitnami/etcd/data && etcd"
    environment:
      ETCD_ENABLE_V2: 'true'
      ALLOW_NONE_AUTHENTICATION: 'yes'
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    ports:
      - '2379:2379'
    volumes:
      - podzone_etcd_data:/bitnami/etcd
    healthcheck:
      test: ['CMD', 'etcdctl', 'endpoint', 'health']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  apisix:
    image: apache/apisix:3.12.0-debian
    container_name: podzone-apisix
    depends_on:
      etcd:
        condition: service_healthy
    volumes:
      - ../../internal/gateway/apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    ports:
      - '9080:9080'
      - '9443:9443'
      - '9180:9180'
    restart: unless-stopped

  apisix-dashboard:
    image: apache/apisix-dashboard:latest
    container_name: podzone-apisix-dashboard
    volumes:
      - ../../internal/gateway/dashboard_conf/conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    ports:
      - '9000:9000'
    restart: unless-stopped

volumes:
  podzone_postgres_data:
  podzone_redis_data:
  podzone_mongo_data:
  podzone_elasticsearch_data:
  podzone_etcd_data:
