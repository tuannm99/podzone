x-go-dev-common: &go-dev-common
  image: podzone-go-dev:latest
  build:
    context: ../..
    dockerfile: deployments/docker/Dockerfile.go-dev
  working_dir: /workspace
  volumes:
    - ../../:/workspace
    - podzone_go_mod_cache:/go/pkg/mod
    - podzone_go_build_cache:/root/.cache/go-build
  environment:
    GOMODCACHE: /go/pkg/mod
    GOCACHE: /root/.cache/go-build
  mem_limit: 512m
  cpus: 1.0

# Profiles
# --------
# backoffice  — auth + iam + partner + catalog + backoffice-service + backoffice-remote + shell
# iam         — auth + iam + iam-remote + shell
# onboarding  — auth + iam + onboarding-service + onboarding-remote + shell
# full        — everything
#
# Usage:
#   docker compose -f infras.yml -f services.yml --profile backoffice up
#   docker compose -f infras.yml -f services.yml --profile iam up
#   docker compose -f infras.yml -f services.yml --profile full up

services:
  auth-service:
    <<: *go-dev-common
    container_name: podzone-auth-dev
    profiles: [backoffice, iam, onboarding, full]
    command: ['sh', 'deployments/docker/run-go-service.sh']
    environment:
      GO_SERVICE: auth
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      CONFIG_PATH: deployments/docker/config/auth.yml
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      APP_REDIRECT_URL: ${APP_REDIRECT_URL:-http://localhost:3000/auth/google/callback}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    # ports:
    #   - '50051:50051'

  auth-worker:
    <<: *go-dev-common
    container_name: podzone-auth-worker-dev
    profiles: [backoffice, iam, onboarding, full]
    command: ['sh', 'deployments/docker/run-go-service.sh']
    environment:
      GO_SERVICE: auth-worker
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      CONFIG_PATH: deployments/docker/config/auth.yml
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_KEY: ${JWT_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  iam-service:
    <<: *go-dev-common
    container_name: podzone-iam-dev
    profiles: [backoffice, iam, onboarding, full]
    command: ['sh', 'deployments/docker/run-go-service.sh']
    environment:
      GO_SERVICE: iam
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      CONFIG_PATH: deployments/docker/config/iam.yml
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_KEY: ${JWT_KEY:-}
      AUTH_GRPC_HOST: auth-service
      AUTH_GRPC_PORT: '50051'
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    # ports:
    #   - '50053:50053'

  iam-worker:
    <<: *go-dev-common
    container_name: podzone-iam-worker-dev
    profiles: [backoffice, iam, onboarding, full]
    command: ['sh', 'deployments/docker/run-go-service.sh']
    environment:
      GO_SERVICE: iam-worker
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      CONFIG_PATH: deployments/docker/config/iam.yml
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_KEY: ${JWT_KEY:-}
      AUTH_GRPC_HOST: auth-service
      AUTH_GRPC_PORT: '50051'
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  catalog-service:
    <<: *go-dev-common
    container_name: podzone-catalog-dev
    profiles: [backoffice, full]
    command: ['sh', 'deployments/docker/run-go-service.sh']
    environment:
      GO_SERVICE: catalog
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      CONFIG_PATH: cmd/catalog/config.yml
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    # ports:
    #   - '50052:50051'

  partner-service:
    <<: *go-dev-common
    container_name: podzone-partner-dev
    profiles: [backoffice, full]
    command: ['sh', 'deployments/docker/run-go-service.sh']
    environment:
      GO_SERVICE: partner
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      CONFIG_PATH: deployments/docker/config/partner.yml
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_KEY: ${JWT_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
      iam-service:
        condition: service_started
    # ports:
    #   - '50054:50054'

  onboarding-service:
    <<: *go-dev-common
    container_name: podzone-onboarding-dev
    profiles: [onboarding, full]
    command: ['sh', 'deployments/docker/run-go-service.sh']
    environment:
      GO_SERVICE: onboarding
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      CONFIG_PATH: deployments/docker/config/onboarding.yml
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_KEY: ${JWT_KEY:-}
      IAM_GRPC_HOST: iam-service
      IAM_GRPC_PORT: '50053'
      BACKOFFICE_INTERNAL_URL: http://backoffice-service:8000
      BACKOFFICE_INTERNAL_SERVICE_TOKEN: ${BACKOFFICE_INTERNAL_SERVICE_TOKEN:-dev-onboarding-token}
      ONBOARDING_SERVICE_TOKEN: ${ONBOARDING_SERVICE_TOKEN:-dev-bootstrap-token}
    depends_on:
      mongo:
        condition: service_healthy
      iam-service:
        condition: service_started
    ports:
      - '8800:8800'

  backoffice-service:
    <<: *go-dev-common
    container_name: podzone-backoffice-dev
    profiles: [backoffice, full]
    command: ['sh', 'deployments/docker/run-go-service.sh']
    environment:
      GO_SERVICE: backoffice
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      CONFIG_PATH: deployments/docker/config/backoffice.yml
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_KEY: ${JWT_KEY:-}
      AUTH_GRPC_HOST: auth-service
      AUTH_GRPC_PORT: '50051'
      IAM_GRPC_HOST: iam-service
      IAM_GRPC_PORT: '50053'
      BACKOFFICE_INTERNAL_SERVICE_TOKEN: ${BACKOFFICE_INTERNAL_SERVICE_TOKEN:-dev-onboarding-token}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started
      auth-worker:
        condition: service_started
      iam-service:
        condition: service_started
      iam-worker:
        condition: service_started
      partner-service:
        condition: service_started
    ports:
      - '8000:8000'

  dev-bootstrap:
    <<: *go-dev-common
    container_name: podzone-dev-bootstrap
    profiles: [backoffice, iam, onboarding, full]
    command: ['sh', '/workspace/scripts/dev/bootstrap_dev_stack.sh']
    environment:
      TENANT_ID: ${TENANT_ID:-tenant-dev}
      TENANT_NAME: ${TENANT_NAME:-Demo POD Tenant}
      TENANT_SLUG: ${TENANT_SLUG:-tenant-dev}
      STORE_NAME: ${STORE_NAME:-Demo Store}
      STORE_SUBDOMAIN: ${STORE_SUBDOMAIN:-demo-store}
      DEV_USERNAME: ${DEV_USERNAME:-devowner}
      DEV_EMAIL: ${DEV_EMAIL:-devowner@podzone.dev}
      DEV_PASSWORD: ${DEV_PASSWORD:-DevPass123!}
      DEV_FULL_NAME: ${DEV_FULL_NAME:-Dev Owner}
      CLUSTER_NAME: ${CLUSTER_NAME:-pg-default}
      DB_NAME: ${DB_NAME:-podzone_tenants}
      PG_HOST: pgbouncer
      PG_PORT: '6432'
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_SSL_MODE: disable
      ONBOARDING_URL: http://onboarding-service:8800
      ONBOARDING_SERVICE_TOKEN: ${ONBOARDING_SERVICE_TOKEN:-dev-bootstrap-token}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_KEY: ${JWT_KEY:-}
      AUTH_BOOTSTRAP_OUTPUT: /workspace/frontend/public/dev-auth-bootstrap.json
      UI_AUTH_BOOTSTRAP_TARGET: /workspace/frontend/public/dev-auth-bootstrap.json
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      auth-service:
        condition: service_started
      auth-worker:
        condition: service_started
      iam-service:
        condition: service_started
      iam-worker:
        condition: service_started
      onboarding-service:
        condition: service_started
        required: false
      partner-service:
        condition: service_started
        required: false
      backoffice-service:
        condition: service_started
        required: false

  grpc-gateway:
    <<: *go-dev-common
    container_name: podzone-grpcgateway-dev
    profiles: [backoffice, iam, onboarding, full]
    command: ['sh', 'deployments/docker/run-go-service.sh']
    environment:
      GO_SERVICE: grpcgateway
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
      CONFIG_PATH: cmd/grpcgateway/config.yml
      GW_HTTP_PORT: '8080'
      AUTH_GRPC_ADDR: auth-service:50051
      IAM_GRPC_ADDR: iam-service:50053
      CATALOG_GRPC_ADDR: catalog-service:50051
      PARTNER_GRPC_ADDR: partner-service:50054
      ORDER_GRPC_ADDR: order-service:50051
      PAYMENT_GRPC_ADDR: payment-service:50051
      CART_GRPC_ADDR: cart-service:50051
    depends_on:
      auth-service:
        condition: service_started
      iam-service:
        condition: service_started
      catalog-service:
        condition: service_started
        required: false
      partner-service:
        condition: service_started
        required: false
      redis:
        condition: service_healthy
    ports:
      - '8080:8080'

  backoffice-remote:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.backoffice-dev
    container_name: podzone-backoffice-remote-dev
    profiles: [backoffice, full]
    working_dir: /app
    command: ['npm', 'run', 'dev:backoffice']
    environment:
      VITE_PODZONE_GW_API_URL: http://localhost:8080
      VITE_PODZONE_GRAPHQL_API_URL: http://localhost:9080/backoffice/graphql
      VITE_PODZONE_ONBOARDING_API_URL: http://localhost:8800
    volumes:
      - ../../frontend:/app
      - podzone_ui_node_modules:/app/node_modules
    mem_limit: 1024m
    cpus: 1.5
    ports:
      - '3001:3001'

  iam-remote:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.backoffice-dev
    container_name: podzone-iam-remote-dev
    profiles: [iam, full]
    working_dir: /app
    command: ['npm', 'run', 'dev:iam']
    volumes:
      - ../../frontend:/app
      - podzone_ui_node_modules:/app/node_modules
    mem_limit: 1024m
    cpus: 1.5
    ports:
      - '3002:3002'

  onboarding-remote:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.backoffice-dev
    container_name: podzone-onboarding-remote-dev
    profiles: [onboarding, full]
    working_dir: /app
    command: ['npm', 'run', 'dev:onboarding']
    environment:
      VITE_PODZONE_GW_API_URL: http://localhost:8080
      VITE_PODZONE_GRAPHQL_API_URL: http://localhost:9080/backoffice/graphql
      VITE_PODZONE_ONBOARDING_API_URL: http://localhost:8800
    volumes:
      - ../../frontend:/app
      - podzone_ui_node_modules:/app/node_modules
    mem_limit: 1024m
    cpus: 1.5
    ports:
      - '3003:3003'

  frontend:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.ui-dev
    container_name: podzone-ui-dev
    profiles: [backoffice, iam, onboarding, full]
    working_dir: /app
    command: ['npm', 'run', 'dev', '--', '--host', '0.0.0.0', '--port', '3000']
    environment:
      VITE_PODZONE_GW_API_URL: http://localhost:8080
      VITE_PODZONE_GRAPHQL_API_URL: http://localhost:9080/backoffice/graphql
      VITE_API_PROXY_TARGET: http://grpc-gateway:8080
      VITE_BACKOFFICE_REMOTE_URL: ${VITE_BACKOFFICE_REMOTE_URL:-http://localhost:9080/mfe/backoffice/assets/remoteEntry.js}
      VITE_IAM_REMOTE_URL: ${VITE_IAM_REMOTE_URL:-http://localhost:9080/mfe/iam/assets/remoteEntry.js}
      VITE_ONBOARDING_REMOTE_URL: ${VITE_ONBOARDING_REMOTE_URL:-http://localhost:9080/mfe/onboarding/assets/remoteEntry.js}
      # Which remotes are actually starting under this `make docker-dev
      # PROFILE=...` invocation — used by vite.config.ts to decide whether a
      # route should attempt the federation import or fall back to the page
      # bundled locally into the HOST. Falls back to "full" when not set
      # (e.g. a raw `docker compose up` bypassing the Makefile), matching
      # prior behavior. See docs/10-knowledge-base/local-dev/ for the
      # incident this fixes.
      VITE_ACTIVE_PROFILES: ${PROFILE:-full}
    volumes:
      - ../../frontend:/app
      - podzone_ui_node_modules:/app/node_modules
    mem_limit: 768m
    cpus: 1.5
    depends_on:
      grpc-gateway:
        condition: service_started
      dev-bootstrap:
        condition: service_started
      backoffice-service:
        condition: service_started
        required: false
      backoffice-remote:
        condition: service_started
        required: false
      iam-remote:
        condition: service_started
        required: false
      onboarding-remote:
        condition: service_started
        required: false
    ports:
      - '3000:3000'

  apisix-init:
    image: curlimages/curl:8.12.1
    container_name: podzone-apisix-init
    profiles: [backoffice, iam, onboarding, full]
    command: ['sh', '/seed/seed.sh']
    volumes:
      - ./apisix-init/seed.sh:/seed/seed.sh:ro
    environment:
      APISIX_ADMIN_URL: http://apisix:9180/apisix/admin
      APISIX_ADMIN_KEY: edd1c9f034335f136f87ad84b625c8f1
    mem_limit: 64m
    cpus: 0.25
    depends_on:
      apisix:
        condition: service_started
      grpc-gateway:
        condition: service_started
      backoffice-service:
        condition: service_started
        required: false
      backoffice-remote:
        condition: service_started
        required: false
      iam-remote:
        condition: service_started
        required: false
      onboarding-remote:
        condition: service_started
        required: false
      frontend:
        condition: service_started

volumes:
  podzone_go_mod_cache:
  podzone_go_build_cache:
  podzone_ui_node_modules:
