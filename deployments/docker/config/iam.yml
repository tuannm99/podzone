logger:
  app_name: 'podzone_admin_iam'
  provider: 'zap'
  level: 'debug'
  env: 'dev'

iam:
  authn:
    jwt_secret: secret
    jwt_key: app-key
  auth:
    grpc_host: auth-service
    grpc_port: 50052

messaging:
  kafka:
    iam:
      topics:
        enabled: true
        main_topics:
          - podzone.iam.events
        retry_attempts: [1, 2, 3, 4, 5]
        create_dead_letter: true
        default_partitions: 3
        default_replication: 1

sql:
  iam:
    uri: postgres://postgres:postgres@postgres:5432/iam?sslmode=disable
    provider: postgres
    should_run_migration: true

kafka:
  iam:
    brokers:
      - kafka:9092
    client_id: podzone-iam
    version: 3.7.0
    required_acks: all
    compression: zstd
    auto_create_topics: false
    consumer_group_prefix: podzone.iam
    sasl:
      enabled: false
      mechanism: ''
      username: ''
      password: ''
    tls:
      enabled: false

grpc:
  port: 50053

pprof:
  enable: false
  addr: '127.0.0.1:6060'
