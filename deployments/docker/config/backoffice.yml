logger:
  app_name: 'podzone_backoffice'
  provider: 'zap'
  level: 'debug'
  env: 'dev'

kv_store:
  provider: mongo
  database: onboarding
  collection: runtime_kv

mongo:
  onboarding:
    uri: mongodb://podzone:podzone123@mongo:27017
    database: onboarding
    ping_timeout: 3s
    connect_timeout: 5s

http:
  address: ':8000'
  trusted_proxies: []

  graphql:
    enabled: true
    query_path: '/query'
    playground:
      enabled: true
      path: '/'

pprof:
  enable: false
  addr: '127.0.0.1:6060'

backoffice:
  internal_service_token: 'dev-onboarding-token'
  auth:
    jwt_secret: 'dev-secret'
    jwt_key: ''
    grpc_host: 'auth-service'
    grpc_port: '50051'
  iam:
    jwt_secret: 'dev-secret'
    jwt_key: ''
    grpc_host: 'iam-service'
    grpc_port: '50053'
  partner:
    jwt_secret: 'dev-secret'
    jwt_key: ''
    grpc_host: 'partner-service'
    grpc_port: '50054'

kafka:
  backoffice:
    brokers:
      - kafka:9092
    client_id: podzone-backoffice
    version: 3.7.0
    required_acks: all
    compression: zstd
    auto_create_topics: false
    consumer_group_prefix: podzone.backoffice
    sasl:
      enabled: false
      mechanism: ''
      username: ''
      password: ''
    tls:
      enabled: false
