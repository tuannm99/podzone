<section [class]="wrapperClass()">
  <div class="max-w-3xl space-y-4">
    @if (eyebrow()) {
      <p class="text-xs font-semibold uppercase tracking-[0.24em] text-gray-500">{{ eyebrow() }}</p>
    }
    <h1 class="text-4xl font-semibold tracking-tight text-gray-900 sm:text-5xl">{{ title() }}</h1>
    @if (copy()) {
      <p class="text-base leading-7 text-gray-600 sm:text-lg">{{ copy() }}</p>
    }
    <div class="flex flex-wrap gap-3 pt-2">
      <ng-content select="[action]" />
      <ng-content select="[secondaryAction]" />
    </div>
  </div>
</section>
