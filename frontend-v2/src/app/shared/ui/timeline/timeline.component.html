<ol [class]="wrapperClass()">
  @for (item of items(); track item.title) {
    <li class="relative">
      <span
        class="absolute -start-[2.05rem] mt-1.5 size-3 rounded-full bg-blue-600 ring-4 ring-white"
      ></span>
      <div class="space-y-1">
        <div class="flex flex-wrap items-center gap-2">
          <h3 class="text-sm font-semibold text-gray-900">{{ item.title }}</h3>
          @if (item.meta) {
            <span class="text-xs uppercase tracking-wide text-gray-400">{{ item.meta }}</span>
          }
        </div>
        @if (item.copy) {
          <p class="text-sm leading-6 text-gray-500">{{ item.copy }}</p>
        }
      </div>
    </li>
  }
</ol>
