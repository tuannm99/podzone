<a
  [routerLink]="href()"
  routerLinkActive="nav-link--active"
  [routerLinkActiveOptions]="{ exact: exact() }"
  #rla="routerLinkActive"
  class="nav-link"
>
  <span><ng-content /></span>
  @if (tag()) {
    <span class="nav-link__tag" [class.nav-link__tag--active]="rla.isActive">{{ tag() }}</span>
  }
</a>
