<mat-form-field appearance="outline" [color]="error() ? 'warn' : 'primary'" class="app-input-field">
  <mat-label>{{ label() }}</mat-label>
  <input
    matInput
    [id]="id()"
    [type]="type()"
    [value]="value()"
    [attr.placeholder]="placeholder()"
    [disabled]="disabled()"
    [attr.aria-invalid]="error() || null"
    [attr.aria-describedby]="errorId()"
    (input)="valueChange.emit($any($event.target).value)"
  />
  @if (errorText()) {
    <mat-hint [attr.id]="errorId()" class="app-input-field__error">{{ errorText() }}</mat-hint>
  }
</mat-form-field>
