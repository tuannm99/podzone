<section [class]="className()">
  @if (title() || copy()) {
    <div class="space-y-1">
      @if (title()) {
        <h3 class="text-lg font-semibold text-gray-900">{{ title() }}</h3>
      }
      @if (copy()) {
        <p class="text-sm text-gray-500">{{ copy() }}</p>
      }
    </div>
  }
  <app-qr-code [value]="value()" />
</section>
