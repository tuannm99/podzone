<div [class]="wrapperClass()">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div class="space-y-1">
      <div class="text-sm font-medium text-gray-800">{{ label() ?? 'Statement editor' }}</div>
      <div class="text-xs text-gray-500">
        {{
          hint() ?? 'Write in Markdown. TOAST UI Editor is not wired yet — see component comment.'
        }}
      </div>
    </div>

    <div
      class="rounded-md bg-gray-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] text-gray-700"
    >
      TOAST UI Editor
    </div>
  </div>

  <textarea
    class="block min-h-[460px] w-full resize-y rounded-md border border-gray-300 p-4 text-sm text-gray-900 outline-none focus:border-gray-950 focus:ring-2 focus:ring-gray-100"
    [value]="value()"
    [placeholder]="placeholder() ?? ''"
    (input)="onInput($any($event.target).value)"
  ></textarea>
</div>
