<app-field-label [label]="label()">
  <div [class]="wrapperClass()" #container>
    <button
      type="button"
      class="flex w-full items-center justify-between rounded-md border border-gray-300 bg-white px-3 py-2.5 text-left text-sm text-gray-900 shadow-sm outline-none transition hover:border-gray-950 focus:border-gray-950 focus:ring-2 focus:ring-gray-100"
      (click)="toggleOpen()"
    >
      <span [class]="value() ? 'text-gray-900' : 'text-gray-400'">{{ displayValue() }}</span>
      <span class="text-gray-400">⌄</span>
    </button>

    @if (open()) {
      <div class="absolute left-0 top-full z-30 mt-2 w-full min-w-[19rem]">
        <app-calendar [value]="value()" [min]="min()" [max]="max()" (select)="onSelect($event)" />
      </div>
    }
  </div>
</app-field-label>
