<div [class]="className()">
  <div class="flex items-center justify-between gap-3">
    <button
      type="button"
      class="rounded-md px-3 py-2 text-sm font-medium text-gray-600 transition hover:bg-gray-100 hover:text-gray-900"
      (click)="previousMonth()"
      aria-label="Previous month"
    >
      ←
    </button>
    <p class="text-sm font-semibold text-gray-900">{{ monthYearLabel() }}</p>
    <button
      type="button"
      class="rounded-md px-3 py-2 text-sm font-medium text-gray-600 transition hover:bg-gray-100 hover:text-gray-900"
      (click)="nextMonth()"
      aria-label="Next month"
    >
      →
    </button>
  </div>

  <div class="mt-4 grid grid-cols-7 gap-2">
    @for (label of weekdayLabels; track label) {
      <span class="text-center text-xs font-semibold uppercase tracking-wide text-gray-400">{{
        label
      }}</span>
    }

    @for (date of grid(); track date.getTime()) {
      <button
        type="button"
        [disabled]="isDisabled(date)"
        [class]="dayClass(date)"
        (click)="selectDate(date)"
      >
        {{ date.getDate() }}
      </button>
    }
  </div>

  <div class="mt-4 flex items-center justify-between gap-3 border-t border-gray-100 pt-4">
    <button
      type="button"
      class="rounded-md px-3 py-2 text-sm font-medium text-gray-600 transition hover:bg-gray-100 hover:text-gray-900"
      (click)="selectToday()"
    >
      Today
    </button>
    @if (value()) {
      <span class="text-sm text-gray-500">{{ valueDisplay() }}</span>
    }
  </div>
</div>
