@if (loading()) {
  <app-loading-block label="Loading…" />
} @else if (error()) {
  <app-error-alert>{{ error() }}</app-error-alert>
} @else if (rows().length === 0) {
  <app-empty-block [title]="emptyTitle()" [copy]="emptyCopy()" />
} @else {
  <table mat-table [dataSource]="rows()" class="data-table">
    @for (column of columns(); track column.key) {
      <ng-container [matColumnDef]="column.key">
        <th mat-header-cell *matHeaderCellDef>{{ column.header }}</th>
        <td mat-cell *matCellDef="let row">
          @if (column.cellTemplate) {
            <ng-container *ngTemplateOutlet="column.cellTemplate; context: { $implicit: row }" />
          } @else {
            {{ column.cell ? column.cell(row) : '' }}
          }
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
  </table>

  <mat-paginator
    [length]="totalCount()"
    [pageSize]="pageSize()"
    [pageIndex]="pageIndex()"
    [pageSizeOptions]="[pageSize()]"
    (page)="onPage($event)"
  />
}
