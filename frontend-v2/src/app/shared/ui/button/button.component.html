<ng-template #content>
  <span class="app-button__content">
    @if (loading()) {
      <app-spinner [diameter]="16" />
    }
    <ng-content />
  </span>
</ng-template>

@if (href() && !isExternal()) {
  @if (variant() === 'stroked') {
    <a
      mat-stroked-button
      [color]="color()"
      [routerLink]="href()"
      [class]="className()"
      [attr.aria-disabled]="disabled() || loading()"
      [attr.aria-label]="ariaLabel()"
      (click)="onLinkClick($event)"
    >
      <ng-container *ngTemplateOutlet="content" />
    </a>
  } @else {
    <a
      mat-flat-button
      [color]="color()"
      [routerLink]="href()"
      [class]="className()"
      [attr.aria-disabled]="disabled() || loading()"
      [attr.aria-label]="ariaLabel()"
      (click)="onLinkClick($event)"
    >
      <ng-container *ngTemplateOutlet="content" />
    </a>
  }
} @else if (href()) {
  @if (variant() === 'stroked') {
    <a
      mat-stroked-button
      [color]="color()"
      [href]="href()"
      [attr.target]="target()"
      rel="noopener noreferrer"
      [class]="className()"
      [attr.aria-disabled]="disabled() || loading()"
      [attr.aria-label]="ariaLabel()"
      (click)="onLinkClick($event)"
    >
      <ng-container *ngTemplateOutlet="content" />
    </a>
  } @else {
    <a
      mat-flat-button
      [color]="color()"
      [href]="href()"
      [attr.target]="target()"
      rel="noopener noreferrer"
      [class]="className()"
      [attr.aria-disabled]="disabled() || loading()"
      [attr.aria-label]="ariaLabel()"
      (click)="onLinkClick($event)"
    >
      <ng-container *ngTemplateOutlet="content" />
    </a>
  }
} @else {
  @if (variant() === 'stroked') {
    <button
      mat-stroked-button
      [color]="color()"
      [type]="type()"
      [class]="className()"
      [disabled]="disabled() || loading()"
      [attr.aria-label]="ariaLabel()"
      (click)="buttonClick.emit($event)"
    >
      <ng-container *ngTemplateOutlet="content" />
    </button>
  } @else {
    <button
      mat-flat-button
      [color]="color()"
      [type]="type()"
      [class]="className()"
      [disabled]="disabled() || loading()"
      [attr.aria-label]="ariaLabel()"
      (click)="buttonClick.emit($event)"
    >
      <ng-container *ngTemplateOutlet="content" />
    </button>
  }
}
