@switch (tag()) {
  @case ('h1') {
    <h1 [class]="className()"><ng-content /></h1>
  }
  @case ('h3') {
    <h3 [class]="className()"><ng-content /></h3>
  }
  @case ('h4') {
    <h4 [class]="className()"><ng-content /></h4>
  }
  @case ('h5') {
    <h5 [class]="className()"><ng-content /></h5>
  }
  @case ('h6') {
    <h6 [class]="className()"><ng-content /></h6>
  }
  @default {
    <h2 [class]="className()"><ng-content /></h2>
  }
}
