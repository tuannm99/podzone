<div [class]="wrapperClass()">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <div class="space-y-1">
      <div class="text-sm font-medium text-gray-800">{{ label() ?? 'Code' }}</div>
      <div class="text-xs text-gray-500">{{ modeHint() }}</div>
    </div>

    <div class="flex flex-wrap items-center gap-2 text-xs text-gray-500">
      <span
        class="rounded-md bg-gray-100 px-2.5 py-1 font-semibold uppercase tracking-wide text-gray-700"
      >
        {{ language() ?? 'code' }}
      </span>
      <span [class]="modeBadgeClass()">{{ mode() }}</span>
      <span>{{ lineCount() }} lines</span>
    </div>
  </div>

  <div class="overflow-hidden rounded-lg bg-white shadow-sm">
    <div
      class="flex items-center justify-between border border-slate-200 border-b-0 bg-white/90 px-4 py-2 text-xs text-slate-500"
    >
      <span class="font-medium uppercase tracking-[0.18em] text-slate-600">Editor</span>
      <span>CodeMirror 6 + Vim (not wired — see component comment)</span>
    </div>

    <textarea
      [style.min-height]="minHeight()"
      class="block w-full resize-y border-0 p-4 font-mono text-[13px] leading-6 text-gray-900 outline-none"
      [value]="value()"
      (input)="onInput($any($event.target).value)"
    ></textarea>
  </div>

  @if (mode() === 'normal') {
    <div class="rounded-md border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-800">
      Normal mode is active. Press <kbd class="rounded bg-white px-1.5 py-0.5 font-mono">i</kbd> to
      type.
    </div>
  }
</div>
