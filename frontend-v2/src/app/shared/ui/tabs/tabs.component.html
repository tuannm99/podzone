<nav mat-tab-nav-bar [tabPanel]="panel">
  @for (tab of tabs(); track tab.value) {
    <button
      type="button"
      mat-tab-link
      [active]="tab.value === activeValue()"
      (click)="activeValueChange.emit(tab.value)"
    >
      {{ tab.label }}
    </button>
  }
</nav>
<mat-tab-nav-panel #panel class="tabs__panel">
  <ng-content />
</mat-tab-nav-panel>
