<div aria-live="polite" aria-atomic="false" class="toaster">
  @for (toast of toaster.toasts(); track toast.id) {
    <div role="status" [class]="toastClass(toast.type)">
      <mat-icon aria-hidden="true">{{ toastIcon(toast.type) }}</mat-icon>
      <span class="toast__message">{{ toast.message }}</span>
      <button
        mat-icon-button
        type="button"
        aria-label="Dismiss"
        class="toast__dismiss"
        (click)="toaster.dismiss(toast.id)"
      >
        <mat-icon aria-hidden="true">close</mat-icon>
      </button>
    </div>
  }
</div>
