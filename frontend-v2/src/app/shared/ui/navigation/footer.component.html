<footer [class]="className()">
  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div class="space-y-2">
      <div><ng-content select="[slot=brand]" /></div>
      @if (note()) {
        <p class="text-sm text-gray-500">{{ note() }}</p>
      }
      <div><ng-content /></div>
    </div>
    @if (links().length > 0) {
      <nav class="flex flex-wrap items-center gap-3 text-sm text-gray-500">
        @for (item of links(); track item.label) {
          <app-nav-action
            [item]="item"
            class="px-0 py-0 hover:bg-transparent"
            activeClass="bg-transparent text-gray-950"
          />
        }
      </nav>
    }
  </div>
</footer>
