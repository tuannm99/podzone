<div [class]="className()">
  @for (item of items(); track item.label) {
    @if (item.href) {
      <app-link
        [href]="item.href"
        class="rounded-full bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-lg ring-1 ring-gray-200 transition hover:bg-gray-50"
      >
        {{ item.label }}
      </app-link>
    } @else {
      <button
        type="button"
        class="rounded-full bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-lg ring-1 ring-gray-200 transition hover:bg-gray-50"
        (click)="onItemClick(item)"
      >
        {{ item.label }}
      </button>
    }
  }
</div>
