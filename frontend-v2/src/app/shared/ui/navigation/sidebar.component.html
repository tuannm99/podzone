<!--
  Simplification: Solid wrapped the title+children block in
  <Show when={props.title || props.children}> — Angular has no direct
  equivalent of checking "was default content actually projected" without
  ContentChild/AfterContentInit lifecycle plumbing. This always renders the
  wrapper; harmless (an empty div) when neither title nor content is given.
-->
<aside [class]="className()">
  <div class="space-y-4">
    <div class="space-y-2">
      @if (title()) {
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-gray-400">{{ title() }}</p>
      }
      <ng-content />
    </div>
    <nav class="space-y-1">
      @for (item of items(); track item.label) {
        <app-nav-action
          [item]="item"
          class="flex w-full justify-start"
          activeClass="bg-gray-100 text-gray-950"
        />
      }
    </nav>
    <div class="border-t border-gray-100 pt-4">
      <ng-content select="[slot=footer]" />
    </div>
  </div>
</aside>
