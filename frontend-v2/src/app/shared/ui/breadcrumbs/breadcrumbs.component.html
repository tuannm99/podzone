<nav aria-label="Breadcrumb" [class]="class()">
  <ol class="flex flex-wrap items-center gap-2 text-sm text-gray-500">
    <!-- Breadcrumb items have no stable id and are always rendered in a
             fixed, non-reordering structural sequence — index tracking is
             safe here, not the general-case anti-pattern. -->
    @for (item of items(); track $index) {
      <li class="flex items-center gap-2">
        @if (item.href && !isCurrent(item, $index)) {
          <app-link
            [href]="item.href"
            class="font-medium text-gray-600 transition hover:text-gray-950"
          >
            {{ item.label }}
          </app-link>
        } @else {
          <span
            [class]="labelClass(item, $index)"
            [attr.aria-current]="isCurrent(item, $index) ? 'page' : null"
          >
            {{ item.label }}
          </span>
        }
      </li>
      @if ($index !== items().length - 1) {
        <li class="text-gray-300" aria-hidden="true">/</li>
      }
    }
  </ol>
</nav>
