<section [class]="className()">
  <div
    class="flex flex-col gap-4 border-b border-gray-100 pb-4 md:flex-row md:items-start md:justify-between"
  >
    <div class="space-y-1">
      <h2 class="text-base font-semibold text-gray-950">{{ title() }}</h2>
      @if (description()) {
        <p class="max-w-2xl text-sm text-gray-600">{{ description() }}</p>
      }
    </div>
    <div class="shrink-0">
      <ng-content select="[aside]" />
    </div>
  </div>

  <div [class]="contentClassName()">
    <ng-content />
  </div>
</section>
