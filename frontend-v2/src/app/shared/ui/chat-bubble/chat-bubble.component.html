<div [class]="wrapperClass()">
  <div [class]="bubbleClass()">
    @if (author() || meta()) {
      <div [class]="metaClass()">
        @if (author()) {
          <span class="font-semibold">{{ author() }}</span>
        }
        @if (meta()) {
          <span>{{ meta() }}</span>
        }
      </div>
    }
    <p class="text-sm leading-6">{{ copy() }}</p>
  </div>
</div>
