<div class="shell">
  <aside class="shell__sidebar">
    <div class="shell__brand">
      <a routerLink="/" class="shell__logo">PZ</a>
      <div class="shell__brand-text">
        <div class="shell__brand-name">Podzone</div>
        <div class="shell__brand-sub">Seller Center</div>
      </div>
    </div>

    <div class="shell__workspace">
      <!-- Static placeholder until workspace context exists — see
                 PZEP-0006 Non-Goals; matches PodzoneNavbar.tsx's "no
                 tenant" state exactly (chip "PZ", label "Choose a store"). -->
      <a routerLink="/" class="shell__workspace-link">
        <span class="shell__workspace-chip">PZ</span>
        <span class="shell__workspace-label">
          <span>Choose a store</span>
        </span>
        <mat-icon aria-hidden="true" class="shell__workspace-chevron">unfold_more</mat-icon>
      </a>
    </div>

    <nav class="shell__nav">
      <app-nav-list label="Platform" [items]="platformNavItems" />
    </nav>

    <div class="shell__footer">
      <div class="shell__avatar">{{ userInitial() }}</div>
      <div class="shell__footer-text">
        <div class="shell__footer-name">
          {{ currentUser()?.username || currentUser()?.email || 'Not signed in' }}
        </div>
        <div class="shell__footer-sub">{{ currentUser()?.email || '' }}</div>
      </div>
      <div class="shell__logout">
        <app-button variant="stroked" ariaLabel="Log out" (buttonClick)="logout()">
          <mat-icon aria-hidden="true">logout</mat-icon>
        </app-button>
      </div>
    </div>
  </aside>

  <header class="shell__header">
    <div class="shell__header-inner">
      <div class="shell__header-text">
        <div class="shell__header-title">Choose a store</div>
        <div class="shell__header-sub">Platform workspace</div>
      </div>
    </div>
  </header>

  <main class="shell__main">
    <div class="shell__main-inner">
      <router-outlet />
    </div>
  </main>
</div>
