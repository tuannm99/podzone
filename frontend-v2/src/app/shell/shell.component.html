<div class="min-h-screen bg-gray-50 text-gray-900">
  <aside
    class="fixed inset-y-0 left-0 z-40 hidden w-64 border-r border-gray-200 bg-white lg:flex lg:flex-col"
  >
    <div class="flex h-16 items-center gap-3 border-b border-gray-200 px-5">
      <a
        routerLink="/"
        class="flex size-9 items-center justify-center rounded-md bg-gray-950 text-xs font-bold tracking-widest text-white"
      >
        PZ
      </a>
      <div class="min-w-0">
        <div class="truncate text-sm font-semibold text-gray-950">Podzone</div>
        <div class="truncate text-xs text-gray-500">Seller Center</div>
      </div>
    </div>

    <div class="border-b border-gray-200 p-3">
      <!-- Static placeholder until workspace context exists — see
                 PZEP-0006 Non-Goals; matches PodzoneNavbar.tsx's "no
                 tenant" state exactly (chip "PZ", label "Choose a store"). -->
      <a
        routerLink="/"
        class="flex h-12 items-center gap-2.5 rounded-md border border-gray-200 px-3 hover:bg-gray-50"
      >
        <span
          class="flex size-7 shrink-0 items-center justify-center rounded-md bg-gray-100 text-[10px] font-bold text-gray-500"
        >
          PZ
        </span>
        <span class="min-w-0 flex-1 text-left">
          <span class="block truncate text-sm font-medium text-gray-950">Choose a store</span>
        </span>
        <svg
          class="size-4 shrink-0 text-gray-400"
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          aria-hidden="true"
        >
          <path d="M7 7l3-3 3 3M7 13l3 3 3-3" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
    </div>

    <nav class="flex-1 space-y-6 overflow-y-auto p-4">
      <div class="space-y-1">
        <div class="px-3 text-xs font-semibold uppercase text-gray-400">Platform</div>
        <app-nav-link href="/" [exact]="true">Home</app-nav-link>
      </div>
    </nav>

    <div class="border-t border-gray-200 p-4">
      <div class="flex items-center gap-3">
        <div
          class="flex size-9 shrink-0 items-center justify-center rounded-full bg-gray-100 text-xs font-semibold text-gray-700"
        >
          PZ
        </div>
        <div class="min-w-0 flex-1">
          <div class="truncate text-sm font-medium text-gray-950">Not signed in</div>
          <div class="truncate text-xs text-gray-500">Auth not wired yet</div>
        </div>
      </div>
    </div>
  </aside>

  <header class="sticky top-0 z-30 border-b border-gray-200 bg-white/95 backdrop-blur lg:pl-64">
    <div class="flex min-h-16 items-center justify-between gap-3 px-4 sm:px-6 lg:px-8">
      <div class="min-w-0">
        <div class="truncate text-sm font-semibold text-gray-950">Choose a store</div>
        <div class="truncate text-xs text-gray-500">Platform workspace</div>
      </div>
    </div>
  </header>

  <main class="pb-8 lg:pl-64">
    <div class="mx-auto mt-5 w-full max-w-[96rem] px-4 sm:px-6 lg:px-8">
      <router-outlet />
    </div>
  </main>
</div>
