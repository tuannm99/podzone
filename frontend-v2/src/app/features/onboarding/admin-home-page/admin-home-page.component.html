<app-card class="admin-home-page__card">
  <div class="admin-home-page__header">
    <div class="admin-home-page__heading">
      <h1 class="admin-home-page__title">Choose a workspace</h1>
      <p class="admin-home-page__subtitle">Select a workspace to continue to its stores.</p>
    </div>
    <app-button variant="stroked" ariaLabel="Log out" (buttonClick)="logout()">
      <mat-icon aria-hidden="true">logout</mat-icon>
    </app-button>
  </div>

  <app-workspace-chooser
    [memberships]="workspace.activeMemberships()"
    [loading]="workspace.memberships.isLoading()"
    [error]="workspace.memberships.error()?.message ?? ''"
    [selectedTenantId]="workspace.selectedTenantId()"
    [selectingTenantId]="selectingTenantId()"
    (select)="onSelectWorkspace($event)"
  />
</app-card>
