logger:
  app_name: 'podzone_admin_auth'
  provider: 'zap' # "zap" | "slog"
  level: 'debug'
  env: 'dev'

auth:
  jwt_secret: 'dev-secret'
  jwt_key: ''
  iam:
    grpc_host: localhost
    grpc_port: '50053'

messaging:
  auth:
    consumers:
      iam_projection:
        enabled: true
        max_attempts: 5
        base_delay: 1s
        observability:
          enabled: true
          log_handled: false
          log_retries: true
          log_dead_letters: true
          log_drops: true
        idempotency:
          enabled: true
          consumer_name: auth.iam-projection
          table_name: message_inbox
  kafka:
    auth:
      topics:
        enabled: true
        main_topics:
          - podzone.iam.events
        retry_attempts: [1, 2, 3, 4, 5]
        create_dead_letter: true
        default_partitions: 3
        default_replication: 1

redis:
  auth:
    uri: redis://redis:6379/0

sql:
  auth:
    uri: postgres://postgres:postgres@postgres:6432/auth?sslmode=disable
    provider: postgres
    should_run_migration: true

kafka:
  auth:
    brokers:
      - localhost:9092
    client_id: podzone-auth
    version: 3.7.0
    required_acks: all
    compression: zstd
    auto_create_topics: false
    consumer_group_prefix: podzone.auth
    sasl:
      enabled: false
    tls:
      enabled: false

grpc:
  port: 50051

pprof:
  enable: false
  addr: '127.0.0.1:6060'
