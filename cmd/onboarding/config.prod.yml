logger:
  provider: zap # zap | slog
  level: debug
  env: dev
  app_name: podzone_onboarding

redis:
  auth:
    uri: '${REDIS_ONBOARDING_DSN}'

mongo:
  onboarding:
    uri: '${MONGO_ONBOARDING_DSN}'
    database: onboarding
    ping_timeout: 3s
    connect_timeout: 5s

onboarding:
  store_provisioning:
    enabled: true
    auto_approve: true
    interval: 5s
    cluster_name: pg-default
    mode: schema
    db_name: postgres
    schema_prefix: t_
    endpoint: postgres://postgres:***@postgres:5432/postgres
    secret_ref: postgres/default

grpc:
  port: 50051
