all: false
pkgname: mocks
template: testify
filename: 'mock_{{.InterfaceName}}.go'
formatter: goimports
force-file-write: true

packages:
  github.com/tuannm99/podzone/pkg/pdlog:
    config:
      dir: pkg/pdlog/mocks
    interfaces:
      Logger:

  github.com/tuannm99/podzone/pkg/toolkit/kvstores:
    config:
      dir: pkg/toolkit/kvstores/mocks
    interfaces:
      KVStore:

  github.com/tuannm99/podzone/pkg/pdtenantdb:
    config:
      dir: pkg/pdtenantdb/mocks
    interfaces:
      Manager:
      PlacementResolver:
      ClusterRegistry:

  github.com/tuannm99/podzone/internal/auth/domain/inputport:
    config:
      dir: internal/auth/domain/inputport/mocks
    interfaces:
      AuthUsecase:
      TokenUsecase:
      UserUsecase:

  github.com/tuannm99/podzone/internal/auth/domain/outputport:
    config:
      dir: internal/auth/domain/outputport/mocks
    interfaces:
      GoogleOauthExternal:
      OauthStateRepository:
      UserRepository:
      SessionRepository:
      RefreshTokenRepository:
      AuditLogRepository:

  github.com/tuannm99/podzone/internal/auth/domain:
    config:
      dir: internal/auth/domain/mocks
    interfaces:
      TenantAccessChecker:

  github.com/tuannm99/podzone/internal/backoffice:
    config:
      dir: internal/backoffice/mocks
    interfaces:
      TenantAuthorizer:
      TenantBootstrapper:

  github.com/tuannm99/podzone/internal/backoffice/domain/inputport:
    config:
      dir: internal/backoffice/domain/inputport/mocks
    interfaces:
      StoreUsecase:
      ProductSetupUsecase:
      OrderRoutingUsecase:

  github.com/tuannm99/podzone/internal/backoffice/domain/outputport:
    config:
      dir: internal/backoffice/domain/outputport/mocks
    interfaces:
      StoreRepository:
      ProductSetupRepository:
      OrderRoutingRepository:
      PartnerDirectory:

  github.com/tuannm99/podzone/internal/iam/domain:
    config:
      dir: internal/iam/domain/mocks
    interfaces:
      TenantRepository:
      OrganizationRepository:
      RoleRepository:
      PolicyRepository:
      GroupRepository:
      PlatformMembershipRepository:
      MembershipRepository:
      InviteRepository:
      IAMUsecase:

  github.com/tuannm99/podzone/internal/partner/domain:
    config:
      dir: internal/partner/domain/mocks
    interfaces:
      PartnerRepository:
      PartnerUsecase:

  github.com/tuannm99/podzone/internal/onboarding/infrasmanager/core:
    config:
      dir: internal/onboarding/infrasmanager/core/mocks
    interfaces:
      ConnectionStore:
